version: "3.8"

services:
  # -----------------------------------------------------------
  # 1. LE MOTEUR D'EXTRACTION (Celui qui plantait tout à l'heure)
  # -----------------------------------------------------------
  etl_moteur:
    # REMPLACE "." PAR LE DOSSIER OÙ SE TROUVE TON DOCKERFILE POUR CE SERVICE
    build: . 
    container_name: etl_moteur
    
    # L'INJECTION DU SECRET (Vital pour ne pas crasher)
    env_file:
      - .env
      
    # LA RÈGLE DE SURVIE : On redémarre automatiquement si le script plante
    restart: unless-stopped
    
    # LE TEST DE SANTÉ (À adapter selon ton code : ex. ping un port ou vérifier un fichier)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"] # À modifier selon ton app
      interval: 30s
      timeout: 10s
      retries: 3

    # L'OBSERVABILITÉ (Envoi direct vers AWS CloudWatch)
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-3
        awslogs-group: /usine-etl/production
        awslogs-stream: etl-moteur

  # -----------------------------------------------------------
  # 2. LE DÉTECTEUR BINANCE (Qui attend que le moteur soit prêt)
  # -----------------------------------------------------------
  detecteur_binance_v2:
    # REMPLACE PAR LE BON DOSSIER
    build: ./dossier_detecteur 
    container_name: detecteur_binance_v2
    
    env_file:
      - .env
      
    restart: unless-stopped
    
    # LA DÉPENDANCE STRICTE : Ne démarre QUE si etl_moteur a réussi son healthcheck
    depends_on:
      etl_moteur:
        condition: service_healthy

    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-3
        awslogs-group: /usine-etl/production
        awslogs-stream: detecteur-binance

  # -----------------------------------------------------------
  # 3. LE TABLEAU DE BORD (Metabase)
  # -----------------------------------------------------------
  metabase:
    image: metabase/metabase:latest # On utilise l'image officielle, pas de build
    container_name: metabase_dashboard
    
    # On expose le port 3000 (Celui qu'on a ouvert dans le Security Group Terraform)
    ports:
      - "3000:3000"
      
    restart: unless-stopped
    
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-3
        awslogs-group: /usine-etl/production
        awslogs-stream: metabase-ui