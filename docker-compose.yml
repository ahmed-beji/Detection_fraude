version: '3.8'

services:
  # ==========================================
  # MACHINE 1 : La Base de Données (PostgreSQL)
  # ==========================================
  db_postgres:
    image: postgres:15
    container_name: bdd_fraude
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" # Map host port 5433 to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data # Rend la base immortelle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-alertes_crypto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MACHINE 2 : Notre Moteur ETL Python
  # ==========================================
  etl_moteur:
    build: . # Demande à Docker de lire notre Dockerfile
    container_name: detecteur_binance_v2
    depends_on:
      db_postgres:
        condition: service_healthy # Règle stricte : Ne démarre que si la BDD est prête
    environment:
      - INTERVALLE_SECONDES=${INTERVALLE_SECONDES}
      - SYMBOLE_CRYPTO=${SYMBOLE_CRYPTO}
      - SEUIL_BALEINE=${SEUIL_BALEINE}
      - DB_HOST=db_postgres # Magie Docker : le nom du conteneur devient son adresse IP !
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    volumes:
      - ./data:/app/data

  # ==========================================
  # MACHINE 3 : Outil de DataViz (Metabase)
  # ==========================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_dataviz
    ports:
      - "3000:3000"
    depends_on:
      - db_postgres
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: db_postgres

# On déclare le disque dur virtuel pour la base de données
volumes:
  postgres_data: